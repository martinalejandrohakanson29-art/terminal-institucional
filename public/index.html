    <style>

            background-color: #f0f2f5;
            color: #1e1e1e;
            border: 1px solid #d1d4dc;
            padding: 3px 7px;
            border-radius: 4px;

            font-weight: bold;
            font-size: 11px;

            align-items: center;
            justify-content: center;
            gap: 3px;

            height: 26px;

        .btn-tiempo:hover, .btn-dibujo:hover { background-color: #e2e8f0; }
        .btn-activo { background-color: #2962FF; color: white; border-color: #2962FF; }

        #rsi-15m-display {

            top: 65px;
            left: 10px;

            background: rgba(255,255,255,0.88);
            border: 1px solid #d1d4dc;
            border-radius: 5px;
            padding: 5px 10px;
            font-size: 13px;
            font-family: monospace;
            font-weight: bold;
            pointer-events: none;
            display: none;
        }

        #orderbook-container {
            width: 320px; min-width: 320px; flex-shrink: 0; background-color: #ffffff; border-left: 1px solid #d1d4dc; display: flex; flex-direction: column; font-size: 13px; overflow-y: auto;
            transition: all 0.2s ease-in-out;

        .input-rango { background-color: #ffffff; color: #1e1e1e; border: 1px solid #d1d4dc; border-radius: 4px; width: 45px; text-align: center; font-weight: bold; font-size: 11px; padding: 2px; outline: none; }

        .btn-histo { background: #f0f2f5; color: #1e1e1e; border: 1px solid #d1d4dc; padding: 3px 7px; border-radius: 4px; cursor: pointer; font-size: 11px; font-weight: bold; }
        .btn-histo:hover { background: #e2e8f0; }
        .btn-histo.btn-activo { background: #2962FF; color: white; border-color: #2962FF; }

        .hist-row { display: flex; align-items: center; height: 20px; padding: 0 4px; border-bottom: 1px solid #f0f2f5; }
        .hist-row.current-price { background: rgba(41,98,255,0.08); border-top: 1px solid rgba(41,98,255,0.35); border-bottom: 1px solid rgba(41,98,255,0.35); }
        .hist-col-buy  { flex: 1; display: flex; justify-content: flex-end; align-items: center; overflow: hidden; }

    <script>
        // ============================================================
        // AUTENTICACIÓN Y CONFIGURACIÓN DE USUARIO
        // ============================================================
        let usuarioActual = null;
        let configGuardadaServidor = {};

        async function verificarSesion() {
            const res = await fetch('/api/auth/me', { credentials: 'same-origin' });
            if (!res.ok) { window.location.replace('/'); throw new Error('No autenticado'); }
            const data = await res.json();
            usuarioActual = data.usuario;

            // Mostrar nombre de usuario en header
            document.getElementById('user-info-name').textContent = usuarioActual.username;
            if (usuarioActual.rol === 'admin') {
                document.getElementById('btn-admin-link').style.display = 'inline-flex';
            }
        }

        async function cargarConfigServidor() {
            try {
                const res = await fetch('/api/config', { credentials: 'same-origin' });
                if (!res.ok) return;
                configGuardadaServidor = await res.json();
            } catch { }
        }

        async function guardarConfigServidor(clave, valor) {
            const res = await fetch('/api/config', {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                credentials: 'same-origin',
                body: JSON.stringify({ clave, valor })
            });
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
        }

        function cfgGet(clave, defecto) {
            if (configGuardadaServidor[clave] !== undefined) return configGuardadaServidor[clave];
            return defecto;
        }

        async function logout() {
            await fetch('/api/auth/logout', { method: 'POST', credentials: 'same-origin' });
            window.location.replace('/');
        }

        // ============================================================
        // HELPERS ---
        function formatUSD(usd) {
            if (usd >= 1_000_000) return `$${(usd / 1_000_000).toFixed(1)}M`;
            if (usd >= 1_000) return `$${(usd / 1_000).toFixed(0)}K`;
            return `$${Math.round(usd)}`;
        }

        function calcularIntensidad(btc, filtro) {
            return Math.max(0.3, Math.min(1.0, btc / (filtro * 10)));
        }

        // --- MEMORIA (servidor por usuario) ---
        const inputFiltroGrafico = document.getElementById('filtro-grafico');

            ],
            calc: (dataList) => {
                const MS_15M = 900000;
                const macdMap = new Map();

                if (velas15m.length >= 35) {
                    const k12 = 2 / 13, k26 = 2 / 27, k9 = 2 / 10;
                    const cierres = velas15m.map(v => v.close);
                    let ema12 = cierres.slice(0, 12).reduce((s, c) => s + c, 0) / 12;
                    let ema26 = cierres.slice(0, 26).reduce((s, c) => s + c, 0) / 26;
                    for (let i = 12; i < 26; i++) ema12 = cierres[i] * k12 + ema12 * (1 - k12);
                    const macdLine = [];
                    for (let i = 26; i < cierres.length; i++) {
                        ema12 = cierres[i] * k12 + ema12 * (1 - k12);
                        ema26 = cierres[i] * k26 + ema26 * (1 - k26);
                        macdLine.push({ ts: velas15m[i].timestamp, v: ema12 - ema26 });
                    }
                    if (macdLine.length >= 9) {
                        let signalEma = macdLine.slice(0, 9).reduce((s, d) => s + d.v, 0) / 9;
                        for (let j = 9; j < macdLine.length; j++) {
                            const { ts, v: macd } = macdLine[j];
                            signalEma = macd * k9 + signalEma * (1 - k9);
                            macdMap.set(ts, { macd, signal: signalEma, histograma: macd - signalEma });
                        }
                    }
                }

                return dataList.map(k => {
                    const t15m = Math.floor(k.timestamp / MS_15M) * MS_15M;
                    return macdMap.get(t15m) || {};
                });
            }

        // --- BÚSQUEDA BINARIA O(log n) ---
        function obtenerVelaExacta(tiempoBuscado_ms) {
            if (tiemposVelasActivas.length === 0) return null;
            let lo = 0, hi = tiemposVelasActivas.length - 1;
            while (lo <= hi) {
                const mid = (lo + hi) >> 1;
                if (tiemposVelasActivas[mid] === tiempoBuscado_ms) return tiemposVelasActivas[mid];
                else if (tiemposVelasActivas[mid] < tiempoBuscado_ms) lo = mid + 1;
                else hi = mid - 1;
            }
            return hi >= 0 ? tiemposVelasActivas[hi] : tiemposVelasActivas[0];
        }

        // --- MERGE OI → VELAS (Map para O(1) lookup) ---
        function aplicarOIAVelas(velas) {
            if (memoriaOIBD.length === 0) return;
            const porTiempo = new Map(velas.map((v, i) => [v.timestamp, i]));
            memoriaOIBD.forEach(d => {
                const t_ms = parseInt(d.tiempo) * 1000;
                if (isNaN(t_ms)) return;
                const tVela = obtenerVelaExacta(t_ms);
                if (tVela === null) return;
                const idx = porTiempo.get(tVela);
                if (idx !== undefined && velas[idx]) velas[idx].oi = parseFloat(d.valor);
            });
        }

        // --- CARGA DE VELAS ---
        async function cargarDatos(temporalidad) {
            if (binanceSocket !== null) {
                binanceSocketIntencional = true;
                if (binanceSocket.readyState === 0) binanceSocket.onopen = () => binanceSocket.close();
                else binanceSocket.close();
            }

            try {
                const limitePorPedido = 1000, totalPedidos = 10;
                console.log(`🚀 Cargando ${totalPedidos * limitePorPedido} velas para ${temporalidad}...`);

                const duracionMs  = DURACION_INTERVALO[temporalidad] || 60000;
                const tamañoBloque = limitePorPedido * duracionMs;
                const ahora = Date.now();

                const pedidos = Array.from({ length: totalPedidos }, (_, i) => {
                    let url = `https://api.binance.com/api/v3/klines?symbol=BTCUSDT&interval=${temporalidad}&limit=${limitePorPedido}`;
                    if (i > 0) url += `&endTime=${ahora - i * tamañoBloque}`;
                    return fetch(url).then(r => r.json()).catch(() => []);
                });

                const resultados = await Promise.all(pedidos);
                const seen = new Set();
                const allVelas = [];
                resultados.flat().forEach(v => {
                    if (Array.isArray(v) && !seen.has(v[0])) { seen.add(v[0]); allVelas.push(v); }

                    tiemposVelasActivas.push(ts);

                    const oiResp = await fetch('/api/open-interest');

                    aplicarOIAVelas(velasActuales);

                chart.applyNewData(velasActuales);
                restaurarDibujos(temporalidad);
                dibujarMarcadores();
                pedirHistorialBallenas(); // después de que las velas están listas

                binanceSocket = new WebSocket(`wss://stream.binance.com:9443/ws/btcusdt@kline_${temporalidad}`);
                binanceSocket.onopen  = () => actualizarEstadoConexion('kline', true);
                binanceSocket.onerror = (e) => console.error('Error kline socket:', e);
                binanceSocket.onclose = () => {
                    actualizarEstadoConexion('kline', false);

                        setTimeout(() => cargarDatos(temporalidadActual), 5000);
                    }
                    binanceSocketIntencional = false;
                };
                binanceSocket.onmessage = function(e) {
                    try {
                        const k = JSON.parse(e.data).k;
                        if (!k) return;
                        const ts = k.t, vol = parseFloat(k.v), c = parseFloat(k.V), vt = vol - c;
                        const ultima = velasActuales.length > 0 ? velasActuales[velasActuales.length - 1] : null;
                        const oiActual = (ultima && ultima.timestamp === ts) ? ultima.oi : null;
                        const kActualizada = { timestamp: ts, open: parseFloat(k.o), high: parseFloat(k.h), low: parseFloat(k.l), close: parseFloat(k.c), volume: vol, delta: c - vt, compras: c, ventas: vt, oi: oiActual };
                        if (ultima && ultima.timestamp === ts) velasActuales[velasActuales.length - 1] = kActualizada;
                        else { velasActuales.push(kActualizada); tiemposVelasActivas.push(ts); }
                        chart.updateData(kActualizada);
                    } catch (err) {
                        console.error('Error procesando mensaje kline:', err);

        function renderizarHistograma(datos) {
            const contenedor = document.getElementById('histo-container');
            if (!contenedor) return;

            if (!datos || datos.length === 0) {
                contenedor.innerHTML = '<div style="text-align:center;color:#94a3b8;padding:20px;font-size:12px;">Sin actividad de ballenas en este período</div>';
                return;
            }

            const precioActual = velasActuales.length > 0 ? velasActuales[velasActuales.length - 1].close : null;

            let maxVol = 0;
            datos.forEach(d => { maxVol = Math.max(maxVol, parseFloat(d.compras || 0), parseFloat(d.ventas || 0)); });
            if (maxVol === 0) maxVol = 1;

            let closestIdx = -1, closestDist = Infinity;
            if (precioActual !== null) {
                datos.forEach((d, i) => {
                    const dist = Math.abs(parseInt(d.nivel) - precioActual);
                    if (dist < closestDist) { closestDist = dist; closestIdx = i; }
                });
            }

            contenedor.innerHTML = datos.map((d, i) => {
                const nivel   = parseInt(d.nivel);
                const compras = parseFloat(d.compras || 0);
                const ventas  = parseFloat(d.ventas  || 0);
                const buyPct  = (compras / maxVol * 100).toFixed(1);
                const sellPct = (ventas  / maxVol * 100).toFixed(1);
                const delta   = compras - ventas;
                const esCurrent = i === closestIdx;
                return `<div class="hist-row${esCurrent ? ' current-price' : ''}" title="C: ${compras.toFixed(2)} BTC | V: ${ventas.toFixed(2)} BTC | Δ: ${delta >= 0 ? '+' : ''}${delta.toFixed(2)} BTC">
                    <div class="hist-col-buy"><div class="hist-bar-buy" style="width:${buyPct}%"></div></div>
                    <div class="hist-price-label">$${nivel.toLocaleString('en-US')}</div>
                    <div class="hist-col-sell"><div class="hist-bar-sell" style="width:${sellPct}%"></div></div>
                </div>`;
            }).join('');

            if (!histoCentrado && closestIdx >= 0) {
                const rows = contenedor.querySelectorAll('.hist-row');
                if (rows[closestIdx]) { rows[closestIdx].scrollIntoView({ block: 'center' }); histoCentrado = true; }
            }
        }

        function calcularRSI14(cierres) {
            const periodo = 14;
            if (cierres.length < periodo + 1) return null;
            // Wilder smoothing
            const ultimos = cierres.slice(-(periodo * 3 + 1));
            let gainSum = 0, lossSum = 0;
            for (let i = 1; i <= periodo; i++) {
                const d = ultimos[i] - ultimos[i - 1];
                if (d >= 0) gainSum += d; else lossSum -= d;
            }
            let avgGain = gainSum / periodo;
            let avgLoss = lossSum / periodo;
            for (let i = periodo + 1; i < ultimos.length; i++) {
                const d = ultimos[i] - ultimos[i - 1];
                avgGain = (avgGain * (periodo - 1) + (d > 0 ? d : 0)) / periodo;
                avgLoss = (avgLoss * (periodo - 1) + (d < 0 ? -d : 0)) / periodo;
            }
            if (avgLoss === 0) return 100;
            return 100 - (100 / (1 + avgGain / avgLoss));
        }

            const cierres = velas15m.map(v => v.close);
            const rsi = calcularRSI14(cierres);
            if (rsi === null) { el.style.display = 'block'; el.style.color = '#64748b'; el.textContent = 'RSI 15m: —'; return; }

            let color;
            if (rsi < 40) color = '#ef5350';

        }

                if (cfg.deltaVisible === false) {
                    deltaVisible = false;
                    document.getElementById('btn-delta').classList.remove('btn-activo');
                    chart.removeIndicator('pane_delta', 'VOL_DELTA');
                }
                if (cfg.oiVisible === false) {
                    oiVisible = false;
                    document.getElementById('btn-oi').classList.remove('btn-activo');
                    chart.removeIndicator('pane_oi', 'OPEN_INTEREST');
                }
                if (cfg.macdVisible === false) {
                    macdVisible = false;
                    document.getElementById('btn-macd').classList.remove('btn-activo');
                    chart.removeIndicator('pane_macd', 'MACD_CUSTOM');
                }

                if (cfg.maVisible === true) {
                    maVisible = true;
                    document.getElementById('btn-ma').classList.add('btn-activo');
                    chart.createIndicator('EMA', true, { id: 'candle_pane' });
                    const params = [], linesStyles = [];
                    if (configMA.e1) { params.push(configMA.p1); linesStyles.push({ color: configMA.c1 }); }
                    if (configMA.e2) { params.push(configMA.p2); linesStyles.push({ color: configMA.c2 }); }
                    if (configMA.e3) { params.push(configMA.p3); linesStyles.push({ color: configMA.c3 }); }
                    if (params.length > 0) chart.overrideIndicator({ name: 'EMA', calcParams: params, styles: { lines: linesStyles } }, 'candle_pane');
                }

                // Dibujos: se pre-cargan en el registro; restaurarDibujos los pintará al cargar velas
                if (cfg.dibujos) registroDibujos = cfg.dibujos;

                cambiarTemporalidad(cfg.temporalidad || '1m');

            } else {
                // Fallback: claves individuales (usuarios sin guardado previo)
                aplicarConfigInicial();
                const cfgMA = cfgGet('configMA', null);
                if (cfgMA) { Object.assign(configMA, cfgMA); initMAUI(); }
                const vwapReset = cfgGet('vwapReset', null);
                if (vwapReset) document.getElementById('select-vwap').value = String(vwapReset);
                cambiarTemporalidad('1m');
            }

            // Estrategias guardadas para el live
            await cargarEstrategiasLive();

            // Auto-trading (solo admin)
            if (usuarioActual && usuarioActual.rol === 'admin') {
                document.getElementById('at-status-bar').style.display = 'flex';
                await actualizarStatusAutoTrading();
                setInterval(actualizarStatusAutoTrading, 30000);
            }

            // RSI 15m: carga inicial + websocket
            await cargarVelas15m();
            iniciarSocket15m();
        })();

        // ── Auto-Trading UI ───────────────────────────────────────────
        async function actualizarStatusAutoTrading() {
            try {
                const res = await fetch('/api/autotrading/status', { credentials: 'same-origin' });
                if (!res.ok) return;
                const cfg = await res.json();
                const dot   = document.getElementById('at-dot');
                const label = document.getElementById('at-label');
                if (cfg.habilitado) {
                    dot.style.background = '#26a69a';
                    const dir = cfg.ultima_senal === 'long'  ? ' · ▲ LONG'
                              : cfg.ultima_senal === 'short' ? ' · ▼ SHORT' : '';
                    label.style.color = cfg.ultima_senal ? (cfg.ultima_senal === 'long' ? '#26a69a' : '#ef5350') : '#374151';
                    label.textContent = `${cfg.estrategia_nombre}${dir}`;
                } else {
                    dot.style.background = '#94a3b8';
                    label.style.color = '#94a3b8';
                    label.textContent = 'Inactivo';
                }
            } catch (_) {}
        }

        async function probarAutoTrading() {
            const btn = document.getElementById('btn-at-test');
            btn.textContent = '⏳';
            btn.disabled = true;
            try {
                // Precio actual del gráfico
                const precioActual = velasActuales.length
                    ? velasActuales[velasActuales.length - 1].close
                    : 95000;

                // Config de auto-trading para obtener estrategia y positionUsdt
                const cfgRes = await fetch('/api/autotrading', { credentials: 'same-origin' });
                const cfg = cfgRes.ok ? await cfgRes.json() : {};
                const positionUsdt = cfg.position_usdt || 100;

                // Params de la estrategia para calcular TP/SL reales
                let tpPerc = 0.5, slPerc = 1.0;
                if (cfg.estrategia_nombre) {
                    const estratRes = await fetch('/api/estrategias', { credentials: 'same-origin' });
                    if (estratRes.ok) {
                        const lista = await estratRes.json();
                        const est = lista.find(e => e.nombre === cfg.estrategia_nombre);
                        if (est) {
                            tpPerc = est.params.tpPerc ?? 0.5;
                            slPerc = est.params.slPerc ?? 1.0;
                        }
                    }
                }

                const entry = precioActual;
                const tp    = entry * (1 + tpPerc / 100);
                const sl    = entry * (1 - slPerc / 100);

                const res = await fetch('/api/autotrading/test', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'same-origin',
                    body: JSON.stringify({ signal: 'long', entry, tp, sl, positionUsdt })
                });
                const data = await res.json();

                if (data.error) {
                    alert(`❌ Error del servidor\n\n${data.error}`);
                    return;
                }

                const entradaOk = data.entrada?.ok;
                const resumen = [
                    `Señal:   LONG`,
                    `Entrada: $${Math.round(entry).toLocaleString()}`,
                    `TP:      $${Math.round(tp).toLocaleString()} (+${tpPerc}%)`,
                    `SL:      $${Math.round(sl).toLocaleString()} (-${slPerc}%)`,
                    `Capital: $${positionUsdt} USDT`,
                    `Qty:     ${data.qty} BTC`,
                    ``,
                    `Orden entrada: ${entradaOk ? '✅ #' + data.entrada.orderId : '❌ ' + (data.entrada?.msg || 'Error')}`,
                    `Orden TP:      ${data.tp?.ok   ? '✅ #' + data.tp.orderId   : '❌ ' + (data.tp?.msg   || 'No enviada')}`,
                    `Orden SL:      ${data.sl?.ok   ? '✅ #' + data.sl.orderId   : '❌ ' + (data.sl?.msg   || 'No enviada')}`,
                ].join('\n');

                if (entradaOk) {
                    alert(`✅ Órdenes ejecutadas en Binance Testnet\n\n${resumen}`);
                } else {
                    alert(`❌ Error al ejecutar órdenes\n\n${resumen}`);
                }
            } catch (e) {
                alert(`❌ Error: ${e.message}`);
            } finally {
                btn.textContent = '▶ Prueba';
                btn.disabled = false;
            }
        }

        async function abrirConfigAutoTrading() {
            // Cargar estrategias en el select
            const res  = await fetch('/api/estrategias', { credentials: 'same-origin' });
            const lista = res.ok ? await res.json() : [];
            const sel  = document.getElementById('at-strat-sel');
            sel.innerHTML = lista.length === 0
                ? '<option value="">— Sin estrategias guardadas —</option>'
                : lista.map(e => `<option value="${e.nombre.replace(/"/g,'&quot;')}">${e.nombre}</option>`).join('');

            // Cargar config actual
            const cfgRes = await fetch('/api/autotrading', { credentials: 'same-origin' });
            if (cfgRes.ok) {
                const cfg = await cfgRes.json();
                if (cfg.estrategia_nombre) sel.value = cfg.estrategia_nombre;
                if (cfg.position_usdt) document.getElementById('at-pos-usdt').value = cfg.position_usdt;
            }

            const overlay = document.getElementById('modal-at-overlay');
            overlay.style.display = 'flex';
            document.getElementById('at-msg').style.display = 'none';
        }

        function cerrarConfigAutoTrading() {
            document.getElementById('modal-at-overlay').style.display = 'none';
        }

        async function guardarConfigAutoTrading(activar) {
            const estrategia_nombre = document.getElementById('at-strat-sel').value;
            const position_usdt     = parseFloat(document.getElementById('at-pos-usdt').value);
            const msgEl = document.getElementById('at-msg');

            if (activar && !estrategia_nombre) {
                msgEl.style.display = 'block';
                msgEl.style.background = '#fef2f2'; msgEl.style.border = '1px solid #fca5a5'; msgEl.style.color = '#dc2626';
                msgEl.textContent = 'Seleccioná una estrategia primero';
                return;
            }

            try {
                const res = await fetch('/api/autotrading', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'same-origin',
                    body: JSON.stringify({ habilitado: activar, estrategia_nombre, position_usdt })
                });
                if (!res.ok) throw new Error((await res.json()).error);
                await actualizarStatusAutoTrading();
                cerrarConfigAutoTrading();
            } catch (e) {
                msgEl.style.display = 'block';
                msgEl.style.background = '#fef2f2'; msgEl.style.border = '1px solid #fca5a5'; msgEl.style.color = '#dc2626';
                msgEl.textContent = 'Error: ' + e.message;
            }
        }

    </script>

    <!-- Modal Auto-Trading Config -->
    <div id="modal-at-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:4000;align-items:center;justify-content:center;" onclick="if(event.target===this)cerrarConfigAutoTrading()">
        <div style="background:#fff;border-radius:10px;padding:26px;width:360px;box-shadow:0 10px 40px rgba(0,0,0,0.2);" onclick="event.stopPropagation()">
            <h3 style="margin-bottom:18px;font-size:15px;">AutoBot — Configuración</h3>
            <div id="at-msg" style="display:none;border-radius:5px;padding:8px 12px;font-size:12px;margin-bottom:12px;"></div>

            <label style="display:block;font-size:12px;font-weight:bold;color:#374151;margin-bottom:5px;">Estrategia</label>
            <select id="at-strat-sel" style="width:100%;padding:8px 10px;border:1px solid #d1d4dc;border-radius:5px;font-size:13px;margin-bottom:14px;background:#f8fafc;"></select>

            <label style="display:block;font-size:12px;font-weight:bold;color:#374151;margin-bottom:5px;">Capital por operación (USDT)</label>
            <input type="number" id="at-pos-usdt" min="10" step="10" value="100"
                style="width:100%;padding:8px 10px;border:1px solid #d1d4dc;border-radius:5px;font-size:13px;margin-bottom:18px;">

            <div style="display:flex;gap:10px;">
                <button onclick="guardarConfigAutoTrading(false)" style="flex:1;padding:10px;border:1px solid #ef5350;border-radius:6px;font-size:13px;background:#fff;color:#ef5350;cursor:pointer;font-weight:bold;">
                    ⏹ Detener
                </button>
                <button onclick="guardarConfigAutoTrading(true)" style="flex:1;padding:10px;border:none;border-radius:6px;font-size:13px;background:#2962FF;color:#fff;cursor:pointer;font-weight:bold;">
                    ▶ Activar
                </button>
            </div>
            <div style="margin-top:12px;font-size:10px;color:#94a3b8;text-align:center;">Solo admin · Testnet Binance Futures · Evalúa cada 60s</div>
        </div>
    </div>

    <!-- Modal cambiar contraseña -->
    <div id="modal-password-overlay" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.4); z-index:4000; align-items:center; justify-content:center;">
        <div style="background:#fff; border-radius:10px; padding:28px; width:340px; box-shadow:0 10px 40px rgba(0,0,0,0.2);" onclick="event.stopPropagation()">
            <h3 style="margin-bottom:18px; font-size:15px;">Cambiar contraseña</h3>
            <div id="pwd-error" style="display:none; background:#fef2f2; border:1px solid #fca5a5; color:#dc2626; border-radius:5px; padding:8px 12px; font-size:12px; margin-bottom:12px;"></div>
            <label style="display:block; font-size:12px; font-weight:bold; color:#374151; margin-bottom:5px;">Contraseña actual</label>
            <input type="password" id="pwd-actual" style="width:100%; padding:9px 11px; border:1px solid #d1d4dc; border-radius:5px; font-size:13px; margin-bottom:12px; outline:none;">
            <label style="display:block; font-size:12px; font-weight:bold; color:#374151; margin-bottom:5px;">Nueva contraseña</label>
            <input type="password" id="pwd-nueva" style="width:100%; padding:9px 11px; border:1px solid #d1d4dc; border-radius:5px; font-size:13px; margin-bottom:20px; outline:none;">
            <div style="display:flex; justify-content:flex-end; gap:10px;">
                <button onclick="document.getElementById('modal-password-overlay').style.display='none'" style="padding:8px 14px; border:1px solid #d1d4dc; background:#f0f2f5; border-radius:5px; cursor:pointer; font-size:13px;">Cancelar</button>
                <button onclick="guardarNuevaPassword()" style="padding:8px 14px; background:#2962FF; color:#fff; border:none; border-radius:5px; cursor:pointer; font-size:13px; font-weight:bold;">Guardar</button>
            </div>
        </div>
    </div>
</body>
